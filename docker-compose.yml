# One-command local stack: `docker compose up`.
# Portable by design — migrate to any host by moving env vars; Postgres+pgvector
# is included now so Phase 2/3 (persistence + RAG) drop in without re-architecting.
services:
  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: postgres://tprm:tprm@db:5432/tprm
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tprm
      POSTGRES_PASSWORD: tprm
      POSTGRES_DB: tprm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
